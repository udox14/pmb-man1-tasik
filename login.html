<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — PMB MAN 1 Tasikmalaya</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* ── Tokens ─────────────────────────────────────────────── */
        :root {
            --ink:       #0d1b2a;
            --ink-mid:   #334155;
            --ink-soft:  #64748b;
            --ink-faint: #94a3b8;
            --rule:      #e2e8f0;
            --rule-dark: #cbd5e1;
            --surface:   #ffffff;
            --bg:        #f8fafc;
            --teal:      #00796b;
            --teal-dark: #004d40;
            --teal-dim:  #e0f2f1;
            --radius:    10px;
            --header-height: 64px;
        }

        body {
            background: var(--bg);
            background-image: none;
            padding-top: var(--header-height);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ─────────────────────────────────────────────── */
        header {
            height: var(--header-height);
            background: rgba(255,255,255,.97);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--rule);
            box-shadow: none;
        }
        .brand-title    { font-size: 1rem; font-weight: 800; color: var(--ink); }
        .brand-subtitle { font-size: .72rem; color: var(--ink-soft); }
        .kemenag-logo   { width: 36px; }
        .nav-actions .btn {
            border-radius: var(--radius);
            padding: 8px 16px;
            font-size: .82rem;
            font-weight: 700;
        }
        .nav-actions .btn-secondary {
            background: var(--bg);
            border: 1px solid var(--rule-dark);
            color: var(--ink-mid);
        }
        .nav-actions .btn-secondary:hover { background: var(--rule); transform: none; }

        /* ── Page center ─────────────────────────────────────────── */
        .login-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px 48px;
        }

        /* ── Login card ─────────────────────────────────────────── */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--rule);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,.06);
            overflow: hidden;
        }

        /* Top accent bar */
        .login-card-accent {
            height: 3px;
            background: var(--teal);
        }

        .login-card-body { padding: 36px 32px 32px; }

        /* School info */
        .login-school {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--rule);
        }
        .login-school img { width: 40px; flex-shrink: 0; }
        .login-school-name {
            font-size: .82rem;
            font-weight: 800;
            color: var(--ink);
            line-height: 1.2;
        }
        .login-school-sub {
            font-size: .7rem;
            color: var(--ink-faint);
            font-weight: 500;
            margin-top: 2px;
        }

        /* Heading */
        .login-heading {
            margin-bottom: 24px;
        }
        .login-heading h1 {
            font-size: 1.45rem;
            font-weight: 800;
            color: var(--ink);
            letter-spacing: -.5px;
            margin-bottom: 4px;
        }
        .login-heading p {
            font-size: .82rem;
            color: var(--ink-soft);
            line-height: 1.5;
        }

        /* Form */
        .login-form-group {
            margin-bottom: 16px;
        }
        .login-label {
            display: block;
            font-size: .76rem;
            font-weight: 700;
            color: var(--ink-mid);
            margin-bottom: 6px;
            letter-spacing: .2px;
        }
        .login-input-wrap { position: relative; }
        .login-input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-faint);
            font-size: 1rem;
            pointer-events: none;
        }
        .login-input {
            width: 100%;
            padding: 12px 14px 12px 38px;
            border: 1px solid var(--rule-dark);
            border-radius: var(--radius);
            font-size: .92rem;
            color: var(--ink);
            background: var(--surface);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            box-sizing: border-box;
            font-family: inherit;
            /* Cegah iOS zoom */
            font-size: 16px;
        }
        .login-input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(0,121,107,.12);
        }
        .login-input::placeholder { color: var(--ink-faint); font-size: .88rem; }

        .login-hint {
            display: block;
            margin-top: 5px;
            font-size: .73rem;
            color: var(--ink-faint);
            line-height: 1.4;
        }
        .login-forgot {
            display: block;
            margin-top: 6px;
            font-size: .73rem;
            color: var(--teal);
            font-weight: 600;
            text-decoration: none;
            text-align: right;
        }
        .login-forgot:hover { text-decoration: underline; }

        /* Submit button */
        .login-btn {
            width: 100%;
            margin-top: 8px;
            padding: 13px;
            background: var(--ink);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: .88rem;
            font-weight: 700;
            letter-spacing: .3px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background .2s;
        }
        .login-btn:hover { background: var(--teal-dark); }
        .login-btn i { font-size: 1rem; }

        /* Footer link */
        .login-footer-link {
            margin-top: 20px;
            text-align: center;
            font-size: .8rem;
            color: var(--ink-soft);
        }
        .login-footer-link a {
            color: var(--teal);
            font-weight: 700;
            text-decoration: none;
        }
        .login-footer-link a:hover { text-decoration: underline; }

        /* ── Mobile ──────────────────────────────────────────────── */
        @media (max-width: 600px) {
            .login-page { padding: 24px 16px 40px; align-items: flex-start; }
            .login-card-body { padding: 28px 20px 24px; }
            .brand-subtitle { display: none; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="container">
            <nav>
                <div class="brand-wrapper">
                    <img src="images/logo.png"
                         onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/2/25/Logo_Kementerian_Agama_Republik_Indonesia_baru_2.png'"
                         alt="Logo Kemenag" class="kemenag-logo">
                    <div class="brand-text">
                        <div class="brand-title">MAN 1 TASIKMALAYA</div>
                        <div class="brand-subtitle">Sukamanah · Sukarame · Kab. Tasikmalaya</div>
                    </div>
                </div>
                <div class="nav-actions">
                    <a href="index.html" class="btn btn-secondary">
                        <i class="ph ph-house"></i>
                        <span class="hide-mobile">Beranda</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <!-- LOGIN -->
    <div class="login-page">
        <div class="login-card">
            <div class="login-card-accent"></div>
            <div class="login-card-body">

                <!-- School identity -->
                <div class="login-school">
                    <img src="images/logo.png"
                         onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/2/25/Logo_Kementerian_Agama_Republik_Indonesia_baru_2.png'"
                         alt="Logo">
                    <div>
                        <div class="login-school-name">MAN 1 TASIKMALAYA</div>
                        <div class="login-school-sub">Portal PMB — Tahun Ajaran 2026/2027</div>
                    </div>
                </div>

                <!-- Heading -->
                <div class="login-heading">
                    <h1>Masuk ke Akun</h1>
                    <p>Gunakan NISN dan tanggal lahir Anda untuk masuk.</p>
                </div>

                <!-- Form — id, onsubmit, onclick dipertahankan untuk auth.js -->
                <form id="loginForm" onsubmit="return false;">

                    <div class="login-form-group">
                        <label class="login-label" for="username">NISN</label>
                        <div class="login-input-wrap">
                            <i class="ph ph-identification-badge login-input-icon"></i>
                            <input type="text" id="username" class="login-input"
                                   placeholder="Masukkan NISN Anda"
                                   autocomplete="username">
                        </div>
                    </div>

                    <div class="login-form-group">
                        <label class="login-label" for="password">Password</label>
                        <div class="login-input-wrap">
                            <i class="ph ph-lock-key login-input-icon"></i>
                            <input type="password" id="password" class="login-input"
                                   placeholder="Tanggal lahir, contoh: 22122008"
                                   autocomplete="current-password">
                        </div>
                        <span class="login-hint">Format: TanggalBulanTahun tanpa spasi atau tanda hubung</span>
                        <a href="https://wa.me/6282218943383?text=Halo%20Kak%20Iqbal%2C%20saya%20lupa%20password%20login%20PMB%20MAN%201%20Tasikmalaya."
                           target="_blank" class="login-forgot">
                            Lupa password?
                        </a>
                    </div>

                    <button type="submit" class="login-btn" onclick="handleLogin()">
                        Masuk Dashboard <i class="ph ph-arrow-right"></i>
                    </button>

                </form>

                <div class="login-footer-link">
                    Belum punya akun?
                    <a href="index.html">Daftar Sekarang</a>
                </div>

            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
